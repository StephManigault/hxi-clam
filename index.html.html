<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>HXI Clamming Pro</title>
    <style>
        :root {
            --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0;
            --accent: #3498db; --danger: #ff4757; --warning: #ffa502; --success: #2ed573; --gold: #ffd700;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Roboto', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        .dashboard { 
            background: var(--card); padding: 12px; border-radius: 16px; width: 100%; max-width: 450px; 
            text-align: center; margin-bottom: 10px; border: 1px solid #333; flex-shrink: 0;
        }
        .profit { color: var(--gold); font-size: 1.4rem; font-weight: bold; letter-spacing: 0.5px; }
        .weight { font-size: 3rem; font-weight: 900; margin: -5px 0; letter-spacing: -1px; }
        .risk-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 8px 0; }
        #risk-fill { height: 100%; width: 0%; background: var(--success); transition: width 0.3s; }

        .scroll-container { 
            width: 100%; max-width: 450px; flex-grow: 1; overflow-y: auto; 
            padding-right: 5px; margin-bottom: 10px;
        }
        .tier-label { font-size: 0.7rem; color: #555; text-transform: uppercase; margin: 15px 0 8px 0; font-weight: bold; letter-spacing: 1.5px; width: 100%; border-bottom: 1px solid #222; padding-bottom: 3px;}
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }

        button.tile { 
            padding: 12px 4px; border-radius: 12px; background: #1a1a1a; color: white; border: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 70px; text-align: center; font-size: 0.8rem; transition: all 0.1s;
        }
        button.tile:active { background: var(--accent); border-color: var(--accent); transform: scale(0.95); }
        .name-label { font-weight: 600; line-height: 1.2; margin-bottom: 6px; }
        .pz-tag { font-size: 0.7rem; color: #888; background: #252525; padding: 2px 6px; border-radius: 4px; border: 1px solid #333; }

        .tier-high { border-bottom: 3px solid var(--gold) !important; box-shadow: inset 0 -10px 20px rgba(255, 215, 0, 0.05); }
        .tier-mid { border-bottom: 3px solid var(--accent) !important; }
        .tier-low { border-bottom: 3px solid #444 !important; }

        .controls { display: flex; gap: 8px; width: 100%; max-width: 450px; padding: 10px 0; flex-shrink: 0; }
        .btn-act { flex: 1; padding: 15px; font-weight: bold; border-radius: 12px; border: none; background: #333; color: white; text-transform: uppercase; font-size: 0.8rem; }
        .btn-reset { background: #b33939; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="profit"><span id="val">0</span><small>g</small></div>
        <div class="weight"><span id="cur">0</span><small style="font-size:1.2rem; opacity:0.2"> / <span id="max">50</span></small></div>
        <div id="itm" style="font-size:0.7rem; opacity:0.5; font-weight: bold;">0 / 10 ITEMS</div>
        <div class="risk-bar"><div id="risk-fill"></div></div>
        <div id="risk-txt" style="font-size:0.7rem; font-weight:bold;">BREAK RISK: 0%</div>
    </div>

    <div class="scroll-container">
        <div class="tier-label">High Value</div>
        <div id="grid-high" class="grid"></div>

        <div class="tier-label">Mid Value</div>
        <div id="grid-mid" class="grid"></div>

        <div class="tier-label">Commons & Trash</div>
        <div id="grid-low" class="grid"></div>
    </div>

    <div class="controls">
        <button class="btn-act" onclick="undo()">Undo</button>
        <button class="btn-act btn-reset" onclick="reset()">Reset</button>
        <select id="cap" style="background:#222; color:white; border:none; padding:10px; border-radius:12px; flex: 0.8;" onchange="render()">
            <option value="50" selected>50pz</option>
            <option value="100">100pz</option>
            <option value="150">150pz</option>
            <option value="250">250pz</option>
        </select>
    </div>

    <script>
        let curW = 0, curG = 0, hist = [];
        
        const fullLootTable = [
            { n: "Oxblood", w: 6, g: 13250, r: 0.3, t: "high" },
            { n: "Tropical Clam", w: 20, g: 5100, r: 1.9, t: "high" },
            { n: "Lacquer Log", w: 6, g: 3578, r: 0.2, t: "high" },
            { n: "HQ Crab Shell", w: 6, g: 3312, r: 0.3, t: "high" },
            { n: "Petrified Log", w: 6, g: 2193, r: 0.2, t: "high" },
            { n: "Coral Frag", w: 6, g: 1735, r: 0.7, t: "mid" },
            { n: "Uragnite Shell", w: 6, g: 1455, r: 0.3, t: "mid" },
            { n: "Turtle Shell", w: 6, g: 1190, r: 0.9, t: "mid" },
            { n: "Bibiki Urchin", w: 6, g: 750, r: 1.0, t: "mid" },
            { n: "Crab Shell", w: 6, g: 392, r: 2.3, t: "mid" },
            { n: "Elm Log", w: 6, g: 390, r: 0.2, t: "mid" },
            { n: "Titanictus Shell", w: 6, g: 357, r: 1.4, t: "mid" },
            { n: "Shall Shell", w: 6, g: 307, r: 5.6, t: "mid" },
            { n: "HQ Pugil Scales", w: 6, g: 253, r: 1.1, t: "mid" },
            { n: "White Sand", w: 7, g: 250, r: 2.0, t: "low" },
            { n: "Vongola Clam", w: 6, g: 192, r: 4.9, t: "low" },
            { n: "Hob Pie", w: 6, g: 153, r: 2.7, t: "low" },
            { n: "Hob Bread", w: 6, g: 91, r: 2.3, t: "low" },
            { n: "Nebimonite", w: 6, g: 53, r: 2.3, t: "low" },
            { n: "Seashell", w: 6, g: 30, r: 1.8, t: "low" },
            { n: "Jacknife", w: 11, g: 20, r: 11.6, t: "low" },
            { n: "Pugil Scales", w: 3, g: 23, r: 3.5, t: "low" },
            { n: "Fish Scales", w: 3, g: 23, r: 3.7, t: "low" },
            { n: "Maple Log", w: 6, g: 15, r: 1.3, t: "low" },
            { n: "Pamtam Kelp", w: 6, g: 7, r: 6.2, t: "low" },
            { n: "Bibiki Slug", w: 3, g: 5, r: 11.1, t: "low" },
            { n: "Pebble", w: 7, g: 1, r: 22.3, t: "low" },
            { n: "Trash Items", w: 6, g: 0, r: 7.0, t: "low" }
        ];

        function initGrids() {
            fullLootTable.forEach(item => {
                const btn = document.createElement('button');
                btn.className = `tile tier-${item.t}`;
                btn.innerHTML = `
                    <span class="name-label">${item.n}</span>
                    <span class="pz-tag">${item.w}pz</span>
                `;
                btn.onclick = () => add(item.n, item.w, item.g);
                document.getElementById(`grid-${item.t}`).appendChild(btn);
            });
        }

        function add(name, w, g) {
            if (hist.length >= 10) return;
            if (navigator.vibrate) navigator.vibrate(10);
            curW += w; curG += g;
            hist.push({w, g});
            render();
        }

        function undo() { if (hist.length) { let l = hist.pop(); curW -= l.w; curG -= l.g; render(); } }
        function reset() { curW = 0; curG = 0; hist = []; render(); }

        function render() {
            const max = +document.getElementById('cap').value;
            document.getElementById('cur').innerText = curW;
            document.getElementById('max').innerText = max;
            document.getElementById('val').innerText = Math.floor(curG).toLocaleString();
            document.getElementById('itm').innerText = `${hist.length} / 10 ITEMS`;

            const rem = max - curW;
            let risk = fullLootTable.filter(i => i.w > rem).reduce((sum, i) => sum + i.r, 0);
            risk = Math.min(Math.round(risk), 100);
            if (curW >= max) risk = 100;

            const fill = document.getElementById('risk-fill');
            const txt = document.getElementById('risk-txt');
            fill.style.width = risk + "%";
            
            if (risk < 30) { fill.style.background = "var(--success)"; txt.style.color = "var(--success)"; }
            else if (risk < 70) { fill.style.background = "var(--warning)"; txt.style.color = "var(--warning)"; }
            else { fill.style.background = "var(--danger)"; txt.style.color = "var(--danger)"; }
            
            txt.innerText = curW >= max ? "BUCKET BROKEN" : `BREAK RISK: ${risk}%`;
            if (curW > max && navigator.vibrate) navigator.vibrate(200);
        }

        initGrids();
        render();
    </script>
</body>
</html>
